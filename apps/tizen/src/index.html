<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=1920, user-scalable=no"/>
    <title>vKara</title>
    <link rel="stylesheet" href="css/style.css"/>
    <!-- Samsung TV Web API (resolved on-device; 404s harmlessly in desktop browsers) -->
    <script src="$WEBAPIS/webapis/webapis.js"></script>
</head>
<body>
    <!-- Splash shown while handing off to the hosted app -->
    <div id="splash">
        <div class="logo">vKara</div>
        <div class="spinner"></div>
        <div class="hint">Loading karaoke room&hellip;</div>
    </div>

    <!-- Error overlay: shown when offline or the hand-off stalls -->
    <div id="error" class="hidden">
        <div class="logo">vKara</div>
        <div class="message" id="error-message">Cannot reach vkara. Check the TV's internet connection.</div>
        <div class="hint">Press <span class="key">OK</span> to retry &nbsp;&bull;&nbsp; <span class="key">BACK</span> to exit</div>
    </div>

    <!-- Engine fingerprint (Tizen x.y / Chrome/xx) — the Chrome version tells
         us what the TV can parse when debugging. -->
    <div id="ua"></div>

    <script src="js/main.js"></script>
</body>
</html>
